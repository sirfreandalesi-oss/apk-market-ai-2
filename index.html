<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK MARKET AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            background: #000;
        }
        #loader-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #050d1a 0%, #000 70%);
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .robot-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 18px;
        }
        .robot-ring { display: none; }
        .loader-logo {
            width: 85px;
            height: auto;
            position: relative;
            z-index: 2;
            animation: float 3.5s infinite ease-in-out, robotColor 3s infinite linear;
        }
        @keyframes robotColor {
            0%   { filter: drop-shadow(0 0 10px #ff0000) drop-shadow(0 0 25px #ff000088) sepia(1) saturate(5) hue-rotate(0deg); }
            17%  { filter: drop-shadow(0 0 10px #ff8000) drop-shadow(0 0 25px #ff800088) sepia(1) saturate(5) hue-rotate(30deg); }
            33%  { filter: drop-shadow(0 0 10px #ffff00) drop-shadow(0 0 25px #ffff0088) sepia(1) saturate(5) hue-rotate(60deg); }
            50%  { filter: drop-shadow(0 0 10px #00ff00) drop-shadow(0 0 25px #00ff0088) sepia(1) saturate(5) hue-rotate(120deg); }
            67%  { filter: drop-shadow(0 0 10px #0088ff) drop-shadow(0 0 25px #0088ff88) sepia(1) saturate(5) hue-rotate(200deg); }
            84%  { filter: drop-shadow(0 0 10px #8b00ff) drop-shadow(0 0 25px #8b00ff88) sepia(1) saturate(5) hue-rotate(270deg); }
            100% { filter: drop-shadow(0 0 10px #ff0000) drop-shadow(0 0 25px #ff000088) sepia(1) saturate(5) hue-rotate(360deg); }
        }
        @keyframes float {
            0%,100% { transform:translateY(0); }
            50%      { transform:translateY(-9px); }
        }
        .eye-l { animation: blink 5s infinite; transform-origin: 42px 43px; }
        .eye-r { animation: blink 5s infinite .1s; transform-origin: 78px 43px; }
        @keyframes blink {
            0%,88%,100% { transform:scaleY(1); }
            93%          { transform:scaleY(0.08); }
        }
        .loading-text {
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            font-size: 36px;
            margin-bottom: 20px;
            text-align: center;
            animation: rainbow-text 3s infinite linear;
            text-shadow: 0 0 20px rgba(255,255,255,.15);
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .loading-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .progress-container {
            opacity: 0;
            transform: translateY(15px);
            transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
        }
        .progress-container.visible {
            opacity: 1;
            transform: translateY(0);
        }
        /* فم الروبوت - مغلق */
        #robot-mouth-open {
            transform-origin: 60px 65px;
            animation: mouthOpen 0.5s ease-out 0.8s forwards;
        }
        #robot-mouth-close {
            transform-origin: 60px 74px;
            animation: mouthClose 0.5s ease-out 0.8s forwards;
        }
        @keyframes mouthOpen {
            0%   { transform: translateY(0);  }
            100% { transform: translateY(-5px); }
        }
        @keyframes mouthClose {
            0%   { transform: translateY(0); }
            100% { transform: translateY(5px); }
        }
        @keyframes rainbow-text {
            0%   { color:#ff0000; }
            17%  { color:#ff8000; }
            33%  { color:#ffff00; }
            50%  { color:#00ff00; }
            67%  { color:#0000ff; }
            84%  { color:#8b00ff; }
            100% { color:#ff0000; }
        }

        .progress-bar {
            height: 32px;
            background: linear-gradient(90deg,#3498db,#9b59b6,#3498db);
            background-size: 200% 100%;
            width: 0%;
            animation-fill-mode: both;
            animation: fillProgress 2s ease-in-out 1.2s forwards, shimmer 1.5s infinite linear;
        }
        .progress-label {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 3;
        }
        .progress-label span {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 12px;
            letter-spacing: 3px;
            color: #fff;
            text-shadow:
                0 0 6px #fff,
                0 0 14px #3498db,
                0 0 28px rgba(52,152,219,.7);
            mix-blend-mode: screen;
        }
        @keyframes fillProgress { 0%{width:0%} 100%{width:100%} }
        @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
        iframe { width:100%; height:100vh; border:none; display:none; }
    </style>
</head>
<body>
<div id="loader-container">
  <div class="robot-wrapper">
    <div class="robot-ring"></div>
    <div class="robot-ring"></div>
    <div class="robot-ring"></div>

    <svg class="loader-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 155">

      <rect x="55" y="19" width="10" height="5" rx="2.5" fill="#0f2847" stroke="#3498db" stroke-width="1"/>

      <circle cx="25" cy="30" r="2.2" fill="#3498db" opacity=".7"/>
      <circle cx="95" cy="30" r="2.2" fill="#3498db" opacity=".7"/>
      <circle cx="25" cy="70" r="2.2" fill="#9b59b6" opacity=".6"/>
      <circle cx="95" cy="70" r="2.2" fill="#9b59b6" opacity=".6"/>
      <!-- خطوط جانبية زخرفية -->
      <line x1="18" y1="40" x2="24" y2="40" stroke="#3498db" stroke-width=".8" opacity=".4"/>
      <line x1="18" y1="46" x2="22" y2="46" stroke="#3498db" stroke-width=".8" opacity=".3"/>
      <line x1="96" y1="40" x2="102" y2="40" stroke="#3498db" stroke-width=".8" opacity=".4"/>
      <line x1="98" y1="46" x2="102" y2="46" stroke="#3498db" stroke-width=".8" opacity=".3"/>

      <!-- ══ عيون ══ -->
      <!-- إطار عين يسرى -->
      <rect x="27" y="34" width="26" height="20" rx="7" fill="#040e1e" stroke="#1e6ab0" stroke-width="1.2"/>
      <rect x="27" y="34" width="26" height="20" rx="7" fill="#3498db" opacity=".04"/>
      <!-- إطار عين يمنى -->
      <rect x="67" y="34" width="26" height="20" rx="7" fill="#040e1e" stroke="#1e6ab0" stroke-width="1.2"/>
      <rect x="67" y="34" width="26" height="20" rx="7" fill="#3498db" opacity=".04"/>

      <!-- حدقة يسرى -->
      <g class="eye-l">
        <circle cx="40" cy="44" r="8"   fill="#0a2850"/>

        <circle cx="40" cy="44" r="2"   fill="#b0eeff" opacity=".85"/>

      </g>
      <!-- حدقة يمنى -->
      <g class="eye-r">
        <circle cx="80" cy="44" r="8"   fill="#0a2850"/>
        <circle cx="80" cy="44" r="7"   fill="url(#g-eye)" filter="url(#f-glow)"/>
        <circle cx="80" cy="44" r="3.5" fill="#061830"/>
        <circle cx="80" cy="44" r="2"   fill="#b0eeff" opacity=".85"/>
        <circle cx="83" cy="41" r="1.2" fill="#fff" opacity=".75"/>
        <circle cx="77" cy="47" r=".7"  fill="#fff" opacity=".4"/>
      </g>

      <!-- ══ فم شريط LED ══ -->
      <g id="robot-mouth-open"><rect x="30" y="65" width="60" height="9" rx="4.5" fill="#040e1e" stroke="#1a3a60" stroke-width="1"/>

      <rect x="76" y="67" width="9"  height="5" rx="2.5" fill="#3498db" opacity=".95" filter="url(#f-soft)"/></g>

      <!-- فك سفلي -->
      <g id="robot-mouth-close"><rect x="30" y="74" width="60" height="4" rx="2" fill="#1a3a60" opacity=".6"/></g>

      <!-- ══ رقبة ══ -->
      <rect x="48" y="76" width="24" height="11" rx="5" fill="url(#g-head)" stroke="#1e5a9e" stroke-width="1.2"/>
      <line x1="54" y1="79" x2="54" y2="83" stroke="#3498db" stroke-width="1" opacity=".45"/>
      <line x1="60" y1="79" x2="60" y2="83" stroke="#3498db" stroke-width="1" opacity=".45"/>
      <line x1="66" y1="79" x2="66" y2="83" stroke="#3498db" stroke-width="1" opacity=".45"/>

      <!-- ══ جسم ══ -->
      <rect x="12" y="87" width="96" height="52" rx="15" fill="#020a16" opacity=".45" transform="translate(2,3)"/>
      <rect x="12" y="87" width="96" height="52" rx="15" fill="url(#g-body)" stroke="#1a4a80" stroke-width="1.8"/>
      <rect x="12" y="87" width="96" height="11" rx="15" fill="#1a3a6a" opacity=".45"/>
      <rect x="12" y="94" width="96" height="4"  rx="0"  fill="#1a3a6a" opacity=".22"/>
      <circle cx="18"  cy="93"  r="2.2" fill="#3498db" opacity=".55"/>
      <circle cx="102" cy="93"  r="2.2" fill="#3498db" opacity=".55"/>
      <circle cx="18"  cy="133" r="2.2" fill="#9b59b6" opacity=".55"/>
      <circle cx="102" cy="133" r="2.2" fill="#9b59b6" opacity=".55"/>

      <!-- ══ شاشة الصدر ══ -->
      <rect x="34" y="95" width="52" height="26" rx="6" fill="url(#g-chest)" stroke="#1e5a9e" stroke-width="1.2"/>
      <g clip-path="url(#cp-chest)">
        <!-- خطوط بيانات ثابتة -->
        <line x1="38" y1="102" x2="82" y2="102" stroke="#3498db" stroke-width=".9" opacity=".4"/>
        <line x1="38" y1="108" x2="75" y2="108" stroke="#9b59b6" stroke-width=".9" opacity=".35"/>
        <line x1="38" y1="114" x2="79" y2="114" stroke="#3498db" stroke-width=".9" opacity=".28"/>
        <!-- خط مسح متحرك -->
        <rect x="34" y="95" width="52" height="2.5" fill="#3498db" opacity=".35">
          <animateTransform attributeName="transform" type="translate" from="0,0" to="0,26" dur="2.2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="2.2s" repeatCount="indefinite"/>
        </rect>
      </g>
      <!-- نقاط نبض -->
      <circle cx="42" cy="118" r="2.8" fill="#3498db" filter="url(#f-soft)">
        <animate attributeName="opacity" values="1;.25;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="52" cy="118" r="2.8" fill="#9b59b6" filter="url(#f-soft)">
        <animate attributeName="opacity" values=".25;1;.25" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="62" cy="118" r="2.8" fill="#3498db" filter="url(#f-soft)">
        <animate attributeName="opacity" values="1;.25;1" dur=".85s" repeatCount="indefinite"/>
      </circle>
      <circle cx="72" cy="118" r="2.8" fill="#9b59b6" filter="url(#f-soft)">
        <animate attributeName="opacity" values=".25;1;.25" dur="1.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="82" cy="118" r="2.8" fill="#3498db" filter="url(#f-soft)">
        <animate attributeName="opacity" values="1;.25;1" dur="1.0s" repeatCount="indefinite"/>

      <!-- ══ ذراع يسرى ══ -->

      <circle cx="5.5" cy="91" r="5.5" fill="#0c1e3a" stroke="#3498db" stroke-width="1.3"/>
      <circle cx="5.5" cy="91" r="2.5" fill="#3498db" opacity=".5"/>
      <line x1="2" y1="103" x2="9" y2="103" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <line x1="2" y1="109" x2="9" y2="109" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <line x1="2" y1="115" x2="9" y2="115" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <rect x="0"  y="126" width="11" height="8" rx="4" fill="#0c1e3a" stroke="#9b59b6" stroke-width="1"/>

      <!-- ══ ذراع يمنى ══ -->
      <rect x="109" y="90" width="12" height="36" rx="6" fill="url(#g-arm)" stroke="#1a4a88" stroke-width="1.2"/>
      <circle cx="114.5" cy="91" r="5.5" fill="#0c1e3a" stroke="#3498db" stroke-width="1.3"/>
      <circle cx="114.5" cy="91" r="2.5" fill="#3498db" opacity=".5"/>
      <line x1="111" y1="103" x2="118" y2="103" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <line x1="111" y1="109" x2="118" y2="109" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <line x1="111" y1="115" x2="118" y2="115" stroke="#3498db" stroke-width=".8" opacity=".35"/>
      <rect x="109" y="126" width="11" height="8" rx="4" fill="#0c1e3a" stroke="#9b59b6" stroke-width="1"/>

      <!-- ══ قدمان ══ -->
      <rect x="24" y="139" width="28" height="13" rx="6" fill="url(#g-body)" stroke="#1a4a80" stroke-width="1.2"/>
      <rect x="21" y="148" width="31" height="6"  rx="3" fill="#071020" stroke="#1a4070" stroke-width="1"/>
      <line x1="28" y1="143" x2="46" y2="143" stroke="#3498db" stroke-width=".7" opacity=".3"/>

      <rect x="68" y="139" width="28" height="13" rx="6" fill="url(#g-body)" stroke="#1a4a80" stroke-width="1.2"/>
      <rect x="68" y="148" width="31" height="6"  rx="3" fill="#071020" stroke="#1a4070" stroke-width="1"/>
      <line x1="72" y1="143" x2="90" y2="143" stroke="#3498db" stroke-width=".7" opacity=".3"/>
    </svg>
  </div>

  <div class="loading-text">APK MARKET AI</div>

  <div class="progress-container">
      <div class="progress-bar"></div>
      <div class="progress-label"><span id="pct">0%</span></div>
  </div>
</div>

<iframe id="siteFrame" src="https://app-akwxrgc59ji9.appmedo.com?s=s" title="App Window"></iframe>

<script>
    // كشف النص بعد فتح الفم
    setTimeout(function() {
        document.querySelector('.loading-text').classList.add('visible');
        document.querySelector('.progress-container').classList.add('visible');
        // بدء عداد النسبة بعد ظهور الشريط
        var pct = document.getElementById('pct');
        var start = Date.now();
        var duration = 2000;
        function updatePct() {
            var elapsed = Date.now() - start;
            var val = Math.min(Math.round((elapsed / duration) * 100), 100);
            pct.textContent = val + '%';
            if (val < 100) requestAnimationFrame(updatePct);
        }
        requestAnimationFrame(updatePct);
    }, 1200);

    setTimeout(function() {
        document.getElementById('loader-container').style.opacity = '0';
        setTimeout(function() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('siteFrame').style.display = 'block';
        }, 500);
    }, 3800);
</script>
</body>
    </html>
