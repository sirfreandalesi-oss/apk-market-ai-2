<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APK MARKET AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&display=swap" rel="stylesheet">
    
    <style>
        /* إعدادات الخلفية السوداء */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            /* تطبيق الخط هنا */
            font-family: 'Cairo', sans-serif;
            overflow: hidden; 
            background-color: #000000;
        }

        /* حاوية شاشة التحميل */
        #loader-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        /* نص APK MARKET AI بألوان متغيرة وخط Cairo Black */
        .loading-text {
            font-family: 'Cairo', sans-serif;
            font-weight: 900; /* هذا هو وزن Black */
            font-size: 36px; /* تم تكبير الخط قليلاً ليتناسب مع الوزن */
            margin-bottom: 20px;
            text-align: center;
            animation: rainbow-text 3s infinite linear;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        /* أنيميشن الألوان للنص */
        @keyframes rainbow-text {
            0% { color: #ff0000; }
            17% { color: #ff8000; }
            33% { color: #ffff00; }
            50% { color: #00ff00; }
            67% { color: #0000ff; }
            84% { color: #8b00ff; }
            100% { color: #ff0000; }
        }

        /* حاوية شريط التحميل */
        .progress-container {
            width: 70%;
            max-width: 400px;
            background-color: #333;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #444;
        }

        /* شريط التحميل المتحرك */
        .progress-bar {
            height: 10px;
            background: linear-gradient(90deg, #3498db, #9b59b6);
            width: 0%;
            animation: fillProgress 2.5s ease-in-out forwards;
        }

        @keyframes fillProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        /* إطار الموقع */
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="loader-container">
    <div class="loading-text">APK MARKET AI</div>
    
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
</div>

<iframe id="siteFrame" src="https://app-akwxrgc59ji9.appmedo.com?s=s" title="App Window"></iframe>

<script>
    setTimeout(function() {
        document.getElementById('loader-container').style.opacity = '0';
        
        setTimeout(function() {
            document.getElementById('loader-container').style.display = 'none';
            document.getElementById('siteFrame').style.display = 'block';
        }, 500);
        
    }, 2500);
</script>

</body>
</html>
